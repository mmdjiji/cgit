server {
    listen          80;
    server_name     localhost;
    root            /usr/share/webapps/cgit;

    include /etc/nginx/conf.d/auth.inc*;

    # Strip .git suffix from repo URLs so both /repo and /repo.git work for git clone and LFS
    rewrite ^/(.+)\.git/(HEAD|info/refs|objects/.*|git-upload-pack|info/lfs/.*)$ /$1/$2 last;

    location / {
        try_files $uri @cgit;
    }

    location ~* ^/(cgit\.(css|png)|favicon\.ico|robots\.txt)$ {
        root /usr/share/webapps/cgit;
        expires 30d;
    }

    # Git LFS requests - route to cgit (must be before git-http-backend)
    location ~ ^/.+/info/lfs/ {
        include             /etc/nginx/fastcgi_params;
        fastcgi_param       SCRIPT_FILENAME $document_root/cgit.cgi;
        fastcgi_param       PATH_INFO       $uri;
        fastcgi_param       QUERY_STRING    $args;
        fastcgi_param       HTTP_HOST       $http_host;
        fastcgi_pass        unix:/var/run/fcgiwrap.sock;
    }

    location ~ ^/.+/(HEAD|info/refs|objects/|git-upload-pack) {
        include             /etc/nginx/fastcgi_params;
        fastcgi_param       SCRIPT_FILENAME /usr/libexec/git-core/git-http-backend;
        fastcgi_param       SCRIPT_NAME "";
        fastcgi_param       GIT_PROJECT_ROOT /srv/git;
        fastcgi_param       GIT_HTTP_EXPORT_ALL "";
        fastcgi_param       PATH_INFO $uri;
        fastcgi_pass        unix:/var/run/fcgiwrap.sock;
    }

    location @cgit {
        include             /etc/nginx/fastcgi_params;
        fastcgi_param       SCRIPT_FILENAME $document_root/cgit.cgi;
        fastcgi_param       PATH_INFO       $uri;
        fastcgi_param       QUERY_STRING    $args;
        fastcgi_param       HTTP_HOST       $server_name;
        fastcgi_pass        unix:/var/run/fcgiwrap.sock;
    }

    error_page  404         /404.html;
    error_page  401         /401.html;

    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    location ~ /\.ht {
        deny  all;
    }
}
