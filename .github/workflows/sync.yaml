name: Sync from CNB

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Sync External Repo to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --local --unset-all http.https://github.com/.extraheader
          git remote add upstream https://cnb.cool/mmdjiji/cgit
          git fetch upstream
          git checkout -B main upstream/main
          git push https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}.git main --force
